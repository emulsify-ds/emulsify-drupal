name: Theme Readiness

on:
  pull_request:
  push:
    branches:
      - main
      - 6.x
  workflow_dispatch:

jobs:
  render-parity:
    name: Render Parity (${{ matrix.drupal-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        drupal-version:
          - '10.3.*'
          - '^10.3'
          - '11.3.*'
          - '^11.3'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2

      - name: Build fixture site
        run: bash .github/scripts/setup-fixture-site.sh "${{ matrix.drupal-version }}" /tmp/emulsify-fixture "$GITHUB_WORKSPACE"

      - name: Compare render output before and after removing stable9
        run: bash .github/scripts/render-parity.sh /tmp/emulsify-fixture /tmp/emulsify-render-parity

  no-stable9-readiness:
    name: No Stable9 Readiness (${{ matrix.drupal-version }})
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        drupal-version:
          - '10.3.*'
          - '^10.3'
          - '11.3.*'
          - '^11.3'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2

      - name: Build fixture site
        run: bash .github/scripts/setup-fixture-site.sh "${{ matrix.drupal-version }}" /tmp/emulsify-fixture "$GITHUB_WORKSPACE"

      - name: Smoke test without stable9 fallback
        run: bash .github/scripts/smoke-without-stable9.sh /tmp/emulsify-fixture /tmp/emulsify-no-stable9

  starterkit-generation:
    name: Starterkit Smoke (${{ matrix.drupal-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        drupal-version:
          - '10.3.*'
          - '^10.3'
          - '11.3.*'
          - '^11.3'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2

      - name: Build fixture site
        run: bash .github/scripts/setup-fixture-site.sh "${{ matrix.drupal-version }}" /tmp/emulsify-fixture "$GITHUB_WORKSPACE"

      - name: Generate and enable a Whisk-derived theme
        run: bash .github/scripts/starterkit-smoke.sh /tmp/emulsify-fixture /tmp/emulsify-generated-theme
