name: Emulsify
type: theme
description: The official parent theme for Emulsify and its flexible component-driven development.
base theme: stable9
core_version_requirement: ^10.3 || ^11
package: emulsify

dependencies:
  - 'drupal:components (^3.0)'
  - 'drupal:emulsify_tools (^1.0)'

libraries:
  - core/normalize
  - emulsify/global

regions:
  header: Header
  content_top: Content Top
  content: Content
  content_bottom: Content Bottom
  footer: Footer

logo: assets/images/logo.svg
