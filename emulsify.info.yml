name: Emulsify
type: theme
description: The official base theme for Emulsify and its flexible component-driven development.
base theme: false
core_version_requirement: ^11.3
package: emulsify

dependencies:
  - 'drupal:emulsify_tools (^1.0)'

libraries:
  - core/normalize
  - emulsify/global

regions:
  header: Header
  content_top: Content Top
  content: Content
  content_bottom: Content Bottom
  footer: Footer

logo: assets/images/logo.svg
