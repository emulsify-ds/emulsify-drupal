type: theme
base theme: emulsify
core_version_requirement: '^11.3 || ^12'

name: whisk
description: A child theme built upon the Emulsify Design System.
package: 'Emulsify'
screenshot: screenshot.png
version: VERSION
hidden: false

dependencies:
  - 'drupal:emulsify_tools (^2.0)'

libraries:
  - whisk/global

regions:
  header: Header
  content_top: Content Top
  content: Content
  content_bottom: Content Bottom
  footer: Footer

logo: assets/images/logo.svg

# Legacy Twig namespace support.
#
# Prefer Drupal Single Directory Component names for new project Twig, such as:
#   {% include "whisk:list" with { items: items } only %}
#
# The namespace mappings below are still valid for existing templates that use
# legacy include paths such as:
#   {% include "@components/button/button.twig" %}
#
# Uncomment only the namespaces needed by existing project code or migration
# work. New project components should use SDC names instead.
# components:
#   namespaces:
#     base: components/00-base
#     atoms: components/01-atoms
#     molecules: components/02-molecules
#     organisms: components/03-organisms
#     templates: components/04-templates
#     pages: components/05-pages
#     components: src/components
#     foundation: src/foundation
#     layout: src/layout
#     tokens: src/tokens
